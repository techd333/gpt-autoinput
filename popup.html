<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テキストファイル自動処理</title>
    <style>
        body {
            width: 300px;
            min-height: 120px;
        }
    </style>
    <link href="./css/tailwind.css" rel="stylesheet">
</head>
<body class="bg-gray-50 p-4 flex items-center justify-center space-x-2">

    <button id="stopBtn" class="px-4 py-2 bg-red-500 text-white rounded">停止</button>
    <script src="popup.js"></script>

</html>
